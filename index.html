<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻语音简报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .player-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .player-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .player-header h1 {
            color: #1a1a2e;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .player-header p {
            color: #666;
            font-size: 14px;
        }
        .album-art {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .album-art::before {
            content: '🎙️';
            font-size: 80px;
        }
        .album-art.playing::before {
            animation: bounce 0.5s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .progress-container {
            margin-bottom: 20px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }
        .time-display {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: #888;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            opacity: 0.7;
            transition: opacity 0.2s, transform 0.2s;
        }
        .control-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        .play-btn {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.5);
        }
        .play-btn::before {
            content: '▶️';
            font-size: 28px;
        }
        .play-btn.playing::before {
            content: '⏸️';
        }
        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .volume-slider {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            background: #e0e0e0;
            border-radius: 2px;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            cursor: pointer;
        }
        .audio-source {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .audio-source label {
            display: block;
            color: #666;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .audio-source input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
        }
        .audio-source input:focus {
            border-color: #667eea;
        }
        .update-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .update-btn:hover {
            opacity: 0.9;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="player-header">
            <h1>📰 新闻语音简报</h1>
            <p id="date"></p>
        </div>
        
        <div class="album-art" id="albumArt"></div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>
        
        <div class="controls">
            <button class="control-btn" id="prevBtn">⏮️</button>
            <button class="play-btn" id="playBtn"></button>
            <button class="control-btn" id="nextBtn">⏭️</button>
        </div>
        
        <div class="volume-container">
            <span>🔈</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
            <span>🔊</span>
        </div>
        
        <div class="audio-source">
            <label>音频链接</label>
            <input type="text" id="audioUrl" placeholder="输入音频文件链接" value="https://jsonproxy.3g.qq.com/urlmapper/kHMH2S">
            <button class="update-btn" id="updateBtn">加载音频</button>
        </div>
        
        <div class="footer">
            由 OpenClaw 自动生成
        </div>
    </div>
    
    <audio id="audio" preload="auto"></audio>
    
    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const albumArt = document.getElementById('albumArt');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const audioUrlInput = document.getElementById('audioUrl');
        const updateBtn = document.getElementById('updateBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        
        // Set today's date
        document.getElementById('date').textContent = new Date().toLocaleDateString('zh-CN', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
        
        // Format time
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        // Play/Pause
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.classList.add('playing');
                albumArt.classList.add('playing');
            } else {
                audio.pause();
                playBtn.classList.remove('playing');
                albumArt.classList.remove('playing');
            }
        });
        
        // Update progress
        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = `${percent}%`;
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });
        
        // Duration loaded
        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
        });
        
        // Progress bar click
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        });
        
        // Volume control
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value / 100;
        });
        audio.volume = 0.8;
        
        // Update audio source
        updateBtn.addEventListener('click', () => {
            const newUrl = audioUrlInput.value.trim();
            if (newUrl) {
                audio.src = newUrl;
                audio.load();
                if (!audio.paused) {
                    audio.play();
                }
            }
        });
        
        // Skip forward/backward
        prevBtn.addEventListener('click', () => {
            audio.currentTime = Math.max(0, audio.currentTime - 10);
        });
        nextBtn.addEventListener('click', () => {
            audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        });
        
        // Audio ended
        audio.addEventListener('ended', () => {
            playBtn.classList.remove('playing');
            albumArt.classList.remove('playing');
            progressFill.style.width = '0%';
        });
        
        // Load initial audio
        audio.src = audioUrlInput.value;
        audio.load();
    </script>
</body>
</html>
