<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻语音简报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .player-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .player-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .player-header h1 {
            color: #1a1a2e;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .player-header p {
            color: #666;
            font-size: 14px;
        }
        .episode-selector {
            margin-bottom: 20px;
        }
        .episode-selector label {
            display: block;
            color: #666;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .episode-select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            background: #f8f9fa;
            cursor: pointer;
            outline: none;
        }
        .episode-select:focus {
            border-color: #667eea;
        }
        .loading-indicator {
            text-align: center;
            padding: 20px;
            color: #666;
            display: none;
        }
        .loading-indicator.show {
            display: block;
        }
        .album-art {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s ease;
        }
        .album-art.playing {
            animation: pulse 2s ease-in-out infinite;
        }
        .album-art.loading {
            animation: spin 1s linear infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .album-art::before {
            content: '🎙️';
            font-size: 80px;
        }
        .album-art.playing::before {
            content: '🎵';
            animation: bounce 0.5s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .episode-info {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea20, #764ba220);
            border-radius: 12px;
        }
        .episode-info h3 {
            color: #1a1a2e;
            font-size: 16px;
            margin-bottom: 5px;
        }
        .episode-info p {
            color: #666;
            font-size: 13px;
        }
        .progress-container {
            margin-bottom: 20px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }
        .time-display {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: #888;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            opacity: 0.7;
            transition: opacity 0.2s, transform 0.2s;
        }
        .control-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        .control-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .play-btn {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.5);
        }
        .play-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .play-btn::before {
            content: '▶️';
            font-size: 28px;
        }
        .play-btn.playing::before {
            content: '⏸️';
        }
        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .volume-slider {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #e0e0e0;
            border-radius: 2px;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            cursor: pointer;
        }
        .audio-source {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .audio-source label {
            display: block;
            color: #666;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .audio-source input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
        }
        .audio-source input:focus {
            border-color: #667eea;
        }
        .update-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .update-btn:hover {
            opacity: 0.9;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 11px;
        }
        .error-msg {
            background: #fee;
            color: #c00;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="player-header">
            <h1>📰 新闻语音简报</h1>
            <p id="date"></p>
        </div>
        
        <div class="error-msg" id="errorMsg"></div>
        
        <div class="episode-selector">
            <label>选择期次</label>
            <select class="episode-select" id="episodeSelect">
                <option value="">加载中...</option>
            </select>
        </div>
        
        <div class="loading-indicator" id="loadingIndicator">
            🔄 正在加载音频...
        </div>
        
        <div class="album-art" id="albumArt"></div>
        
        <div class="episode-info" id="episodeInfo">
            <h3 id="episodeTitle">选择一期开始收听</h3>
            <p id="episodeDate"></p>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>
        
        <div class="controls">
            <button class="control-btn" id="prevBtn" title="快退10秒">⏮️</button>
            <button class="play-btn" id="playBtn" disabled></button>
            <button class="control-btn" id="nextBtn" title="快进10秒">⏭️</button>
        </div>
        
        <div class="volume-container">
            <span>🔈</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
            <span>🔊</span>
        </div>
        
        <div class="audio-source">
            <label>或直接输入音频链接</label>
            <input type="text" id="audioUrl" placeholder="输入音频文件链接">
            <button class="update-btn" id="updateBtn">加载自定义音频</button>
        </div>
        
        <div class="footer">
            由 OpenClaw 自动生成 · GitHub Pages 托管
        </div>
    </div>
    
    <audio id="audio" preload="auto"></audio>
    
    <script>
        // Configuration
        const CONFIG = {
            audioBaseUrl: 'https://raw.githubusercontent.com/jaggerchang-ship-it/news-player/main/audio/',
            indexUrl: 'https://raw.githubusercontent.com/jaggerchang-ship-it/news-player/main/audio/index.json'
        };
        
        // DOM Elements
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const albumArt = document.getElementById('albumArt');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const audioUrlInput = document.getElementById('audioUrl');
        const updateBtn = document.getElementById('updateBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const episodeSelect = document.getElementById('episodeSelect');
        const episodeTitle = document.getElementById('episodeTitle');
        const episodeDate = document.getElementById('episodeDate');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const errorMsg = document.getElementById('errorMsg');
        
        // State
        let episodes = [];
        let currentEpisode = null;
        
        // Set today's date
        document.getElementById('date').textContent = new Date().toLocaleDateString('zh-CN', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
        
        // Format time
        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        // Show error
        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
            setTimeout(() => errorMsg.classList.remove('show'), 5000);
        }
        
        // Show loading
        function showLoading(show) {
            loadingIndicator.classList.toggle('show', show);
            albumArt.classList.toggle('loading', show);
        }
        
        // Load episodes from index
        async function loadEpisodes() {
            try {
                showLoading(true);
                const response = await fetch(CONFIG.indexUrl);
                if (!response.ok) throw new Error('无法加载节目列表');
                
                const data = await response.json();
                episodes = data.episodes || [];
                
                // Populate select
                episodeSelect.innerHTML = '';
                if (episodes.length === 0) {
                    episodeSelect.innerHTML = '<option value="">暂无节目</option>';
                } else {
                    episodes.forEach((ep, index) => {
                        const option = document.createElement('option');
                        option.value = index;
                        option.textContent = `${ep.date} - ${ep.title}`;
                        episodeSelect.appendChild(option);
                    });
                    // Auto-select latest
                    episodeSelect.selectedIndex = 0;
                    loadEpisode(0);
                }
            } catch (error) {
                console.error('Load episodes error:', error);
                showError('加载节目列表失败，请检查网络或输入自定义链接');
                episodeSelect.innerHTML = '<option value="">加载失败</option>';
                // Enable custom URL input as fallback
                audioUrlInput.placeholder = '请输入音频链接';
            } finally {
                showLoading(false);
            }
        }
        
        // Load selected episode
        function loadEpisode(index) {
            if (index < 0 || index >= episodes.length) return;
            
            const episode = episodes[index];
            currentEpisode = episode;
            
            // Update UI
            episodeTitle.textContent = episode.title;
            episodeDate.textContent = episode.date + (episode.duration ? ' · ' + episode.duration : '');
            
            // Build audio URL
            const audioUrl = CONFIG.audioBaseUrl + episode.filename;
            audioUrlInput.value = audioUrl;
            
            // Load audio
            loadAudio(audioUrl);
        }
        
        // Load audio file
        function loadAudio(url) {
            if (!url) return;
            
            showLoading(true);
            playBtn.disabled = true;
            
            // Stop current playback
            audio.pause();
            audio.currentTime = 0;
            
            // Set new source
            audio.src = url;
            audio.load();
            
            // Update UI
            albumArt.classList.remove('playing');
            playBtn.classList.remove('playing');
            progressFill.style.width = '0%';
            currentTimeEl.textContent = '0:00';
            durationEl.textContent = '0:00';
        }
        
        // Play/Pause
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(err => {
                    showError('播放失败: ' + err.message);
                });
                playBtn.classList.add('playing');
                albumArt.classList.add('playing');
            } else {
                audio.pause();
                playBtn.classList.remove('playing');
                albumArt.classList.remove('playing');
            }
        });
        
        // Audio events
        audio.addEventListener('canplay', () => {
            showLoading(false);
            playBtn.disabled = false;
            durationEl.textContent = formatTime(audio.duration);
        });
        
        audio.addEventListener('playing', () => {
            showLoading(false);
            playBtn.disabled = false;
            playBtn.classList.add('playing');
            albumArt.classList.add('playing');
        });
        
        audio.addEventListener('waiting', () => {
            showLoading(true);
        });
        
        audio.addEventListener('error', (e) => {
            showLoading(false);
            showError('音频加载失败，请检查链接是否有效');
            playBtn.disabled = true;
            console.error('Audio error:', audio.error);
        });
        
        // Update progress
        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100 || 0;
            progressFill.style.width = `${percent}%`;
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });
        
        // Progress bar click
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (audio.duration) {
                audio.currentTime = percent * audio.duration;
            }
        });
        
        // Volume control
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value / 100;
        });
        audio.volume = 0.8;
        
        // Episode select change
        episodeSelect.addEventListener('change', (e) => {
            loadEpisode(parseInt(e.target.value));
        });
        
        // Update audio source (custom URL)
        updateBtn.addEventListener('click', () => {
            const url = audioUrlInput.value.trim();
            if (url) {
                // Clear episode selection when using custom URL
                currentEpisode = null;
                episodeTitle.textContent = '自定义音频';
                episodeDate.textContent = url.split('/').pop();
                loadAudio(url);
            }
        });
        
        // Skip forward/backward
        prevBtn.addEventListener('click', () => {
            audio.currentTime = Math.max(0, audio.currentTime - 10);
        });
        nextBtn.addEventListener('click', () => {
            if (audio.duration) {
                audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
            }
        });
        
        // Audio ended
        audio.addEventListener('ended', () => {
            playBtn.classList.remove('playing');
            albumArt.classList.remove('playing');
            progressFill.style.width = '0%';
        });
        
        // Initialize
        loadEpisodes();
    </script>
</body>
</html>
